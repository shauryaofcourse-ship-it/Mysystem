<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manhwa System Page</title>

<style>
    body {
        margin: 0;
        background: black;
        font-family: Arial, sans-serif;
        color: cyan;
        overflow-x: hidden;
    }

    /* System Box Styling */
    .system-box {
        border: 8px solid #a64ca6;
        padding: 20px 40px;
        margin: 20px 0;
        box-shadow: 0 0 30px #a64ca6,
                    inset 0 0 15px #a64ca6;
        font-size: 30px;
        font-family: 'Courier New', monospace;
        font-weight: bold;

        text-shadow:
            0 0 5px #e0b3e0,
            0 0 10px #e0b3e0,
            0 0 20px #e0b3e0;

        text-align: center;
        opacity: 0;
        transform: translateY(50px);
        transition: all 1s ease;

        max-width: 600px;
        width: 99%;
        height: 400px;

        display: flex;
        justify-content: center;
        align-items: center;

        background-color: rgba(166, 76, 166, 0.2);

        background-image: repeating-linear-gradient(
            0deg,
            rgba(255,255,255,0.05) 0px,
            rgba(255,255,255,0.05) 1px,
            transparent 1px,
            transparent 10px
        );

        border-radius: 5px;
    }

    /* Fade-in */
    .show {
        opacity: 1;
        transform: translateY(0);
    }

    /* Sections */
    .section {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    /* Typing cursor */
    .typing::after {
        content: '|';
        animation: blink 1s infinite;
        margin-left: 2px;
    }

    @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
    }

    /* -------- REAL GLITCH EFFECT (single text) -------- */

    .glitch {
        animation: glitchIn 1.5s ease, glitchNoise 0.2s infinite;
    }

    @keyframes glitchIn {
        0% {
            opacity: 0;
            transform: scale(0.8);
            filter: blur(5px);
        }

        20% {
            opacity: 0.3;
            transform: translate(5px, -5px) skewX(10deg);
        }

        40% {
            opacity: 0.6;
            transform: translate(-5px, 5px) skewX(-10deg);
        }

        60% {
            opacity: 1;
            transform: translate(3px, -3px);
            filter: blur(1px);
        }

        100% {
            opacity: 1;
            transform: none;
            filter: blur(0);
        }
    }

    @keyframes glitchNoise {
        0% { transform: translate(0, 0); }
        20% { transform: translate(-2px, 2px); }
        40% { transform: translate(2px, -2px); }
        60% { transform: translate(-1px, 1px); }
        80% { transform: translate(1px, -1px); }
        100% { transform: translate(0, 0); }
    }

</style>
</head>

<body>

<!-- Background Music -->
<audio id="bgVoice" autoplay loop>
    <source src="your-audio-file.mp3" type="audio/mpeg">
</audio>

<!-- Sections -->

<div class="section">
    <div class="system-box show glitch" id="initBox">
        Initializing System...
    </div>
</div>

<div class="section">
    <div class="system-box typing" id="helloBox"></div>
</div>

<div class="section">
    <div class="system-box">Loading Features...</div>
    <div class="system-box">Setting Preferences...</div>
</div>

<div class="section">
    <div class="system-box">Ready-ing to Launch 🚀</div>
    <div class="system-box">Stay Updated! Your Mystical System is Under creation.</div>
</div>

<script>
    // Auto-scroll
    let scrollSpeed = 4;

    function autoScroll() {
        window.scrollBy(0, scrollSpeed);
        if ((window.innerHeight + window.scrollY) < document.body.scrollHeight) {
            requestAnimationFrame(autoScroll);
        }
    }
    requestAnimationFrame(autoScroll);

    // Fade-in
    const boxes = document.querySelectorAll(".system-box");

    function showOnScroll() {
        boxes.forEach(box => {
            const top = box.getBoundingClientRect().top;
            if (top < window.innerHeight - 100) {
                box.classList.add("show");
            }
        });
    }

    window.addEventListener("scroll", showOnScroll);
    showOnScroll();

    // Typing effect
    const helloText = "Hello, User";
    const helloBox = document.getElementById("helloBox");
    let index = 0;

    function typeHello() {
        if (index < helloText.length) {
            helloBox.textContent += helloText.charAt(index);
            index++;
            setTimeout(typeHello, 100);
        }
    }

    function startTyping() {
        const top = helloBox.getBoundingClientRect().top;
        if (top < window.innerHeight - 100 && index === 0) {
            typeHello();
        }
    }

    window.addEventListener("scroll", startTyping);
    startTyping();

    // STOP glitch after animation
    const initBox = document.getElementById("initBox");

    setTimeout(() => {
        initBox.classList.remove("glitch");
    }, 1500);

    // Audio
    const bgVoice = document.getElementById("bgVoice");
    bgVoice.volume = 0.3;

    window.addEventListener('click', () => {
        bgVoice.play();
    });
</script>

</body>
</html>
